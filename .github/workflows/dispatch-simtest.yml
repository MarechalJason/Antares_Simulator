name: Dispatch SimTest (reusable)

on:
  workflow_call:
    inputs:
      tag_name:
        description: 'Tag name for RC (ex: v9.3.6-rc1)'
        required: false
        type: string
      release_tag:
        description: 'Alternate tag name (fallback)'
        required: false
        type: string
      release_url:
        description: 'URL of the created release'
        required: false
        type: string
      release_name:
        description: 'Release title (optional)'
        required: false
        type: string
      simtest_repo:
        description: 'Owner/Repo for SimTest (ex: AntaresSimulatorTeam/SimTest)'
        required: false
        type: string
        default: 'AntaresSimulatorTeam/SimTest'
    secrets:
      SIMTEST_PAT:
        required: true

permissions:
  contents: read
  id-token: none

jobs:
  wait-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify SIMTEST PAT and access
        env:
          SIMTEST_PAT: ${{ secrets.SIMTEST_PAT }}
          SIMTEST_REPO: ${{ inputs.simtest_repo }}
        run: |
          set -euo pipefail
          echo "Vérification du token et de l'accès au dépôt: $SIMTEST_REPO"

          # Vérifier le propriétaire du token et les scopes via /user (headers contiennent X-OAuth-Scopes)
          echo "Checking token owner and scopes..."
          curl -s -D /tmp/token_headers -o /tmp/token_body -H "Authorization: token $SIMTEST_PAT" https://api.github.com/user || true
          echo "Token owner response (body head):"
          head -c 400 /tmp/token_body || true
          echo
          echo "Token scopes (X-OAuth-Scopes):"
          grep -i '^x-oauth-scopes:' /tmp/token_headers || true
          echo

          # Vérifier l'accès au dépôt cible (utile pour diagnostiquer 403)
          echo "Checking repository access..."
          HTTP_REPO=$(curl -s -o /tmp/repo_body -w "%{http_code}" -H "Authorization: token $SIMTEST_PAT" "https://api.github.com/repos/${SIMTEST_REPO}") || true
          echo "Repo HTTP code: $HTTP_REPO"
          echo "Repo response (first 800 chars):"
          head -c 800 /tmp/repo_body || true
          if [ "$HTTP_REPO" != "200" ]; then
            echo "Impossible d'accéder au dépôt avec ce token (code $HTTP_REPO). Vérifiez le scope du PAT, l'accès du compte au dépôt ou l'autorisation SSO."
            exit 2
          else
            echo "Accès au dépôt OK."
          fi

      - name: Dispatch to SimTest
        env:
          SIMTEST_PAT: ${{ secrets.SIMTEST_PAT }}
          SIMTEST_REPO: ${{ inputs.simtest_repo }}
          INPUT_TAG: ${{ inputs.tag_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_RELEASE_URL: ${{ inputs.release_url }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          set -euo pipefail

          # Initialize inputs into shell variables early to avoid using unset vars
          INPUT_TAG="${INPUT_TAG:-}"
          # Use the workflow input directly (exposed by GitHub expressions) and keep local shell vars
          WORKFLOW_RELEASE_TAG="${INPUT_RELEASE_TAG}"
          INPUT_RELEASE_URL="${INPUT_RELEASE_URL:-}"
          INPUT_RELEASE_NAME="${INPUT_RELEASE_NAME:-}"

          # Determine tag and release_url with fallbacks
          # Prefer explicit tag_name input, then release_tag input (from workflow input)
          if [ -n "${INPUT_TAG}" ]; then
            TAG="${INPUT_TAG}"
            echo "Using TAG from tag_name input: ${TAG}"
          elif [ -n "${WORKFLOW_RELEASE_TAG}" ]; then
            TAG="${WORKFLOW_RELEASE_TAG}"
            echo "Derived TAG from release_tag input: ${TAG}"
          else
            TAG=""
          fi

          RELEASE_URL="${INPUT_RELEASE_URL}"
          if [ -z "${RELEASE_URL}" ] && [ -n "${INPUT_RELEASE_NAME}" ]; then
            echo "No release_url provided; release_name was provided: ${INPUT_RELEASE_NAME}."
          fi

          if [ -z "${TAG}" ] && [ -z "${RELEASE_URL}" ]; then
            echo "Warning: No tag or release_url provided via inputs. Continuing but client_payload will have empty fields." >&2
          fi

          # Include release_name in payload as fallback/metadata
          RELEASE_NAME="${INPUT_RELEASE_NAME}"
          if [ -n "${RELEASE_NAME}" ]; then
            echo "Release name provided: ${RELEASE_NAME}"
          fi

          # Map release_tag: prefer the workflow input release_tag
          RELEASE_TAG="${WORKFLOW_RELEASE_TAG:-}"
          if [ -n "${RELEASE_TAG}" ]; then
            echo "Using RELEASE_TAG from release_tag input: ${RELEASE_TAG}"
          fi

          # Build payload: tag_name and release_tag carry the needed values
          CLIENT_PAYLOAD=$(jq -n --arg tag "$TAG" --arg release_tag "$RELEASE_TAG" --arg release_url "$RELEASE_URL" --arg release_name "$RELEASE_NAME" '{ tag_name:$tag, release_tag:$release_tag, release_url:$release_url, release_name:$release_name }')

          ATTEMPT=0
          MAX=3
          while [ $ATTEMPT -lt $MAX ]; do
            ATTEMPT=$((ATTEMPT+1))
            echo "Dispatch attempt $ATTEMPT to $SIMTEST_REPO"

            # Build dispatch JSON and log request body (safe to log)
            DISPATCH_JSON=$(jq -n --arg etype "generate-reference" --argjson payload "$CLIENT_PAYLOAD" '{event_type: $etype, client_payload: $payload}')
            echo "$DISPATCH_JSON" > /tmp/dispatch_request.json

            # Perform the POST; capture response headers, body, http code and timing
            HTTP_AND_TIME=$(curl -s -D /tmp/dispatch_headers -o /tmp/dispatch_resp -w "%{http_code} %{time_total}" -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: token $SIMTEST_PAT" \
              "https://api.github.com/repos/${SIMTEST_REPO}/dispatches" \
              -d "$DISPATCH_JSON" ) || true

            # Parse HTTP code and timing
            HTTP=$(echo "$HTTP_AND_TIME" | awk '{print $1}') || HTTP=""
            TIME=$(echo "$HTTP_AND_TIME" | awk '{print $2}') || TIME=""

            # Emit logs (do not print the token). These are safe: request body, response headers/body, code, timing
            echo "--- Dispatch request body (/tmp/dispatch_request.json) ---"
            cat /tmp/dispatch_request.json || true
            echo "--- Response headers (/tmp/dispatch_headers) ---"
            sed -n '1,200p' /tmp/dispatch_headers || true
            echo "--- Response body (/tmp/dispatch_resp) ---"
            head -c 10000 /tmp/dispatch_resp || true
            echo "--- HTTP code: ${HTTP}, time: ${TIME}s ---"

            if [ "$HTTP" = "204" ] || [ "$HTTP" = "200" ]; then
              echo "Dispatch succeeded"
              exit 0
            else
              echo "Dispatch returned HTTP $HTTP"
              if [ $ATTEMPT -lt $MAX ]; then
                echo "Retrying in 5s..."
                sleep 5
              else
                echo "All attempts failed"
                exit 2
              fi
            fi
          done

