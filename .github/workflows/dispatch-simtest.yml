name: Dispatch SimTest (reusable)

on:
  workflow_call:
    inputs:
      tag_name:
        description: 'Tag name for RC (ex: v9.3.6-rc1)'
        required: true
        type: string
      release_url:
        description: 'URL of the created release'
        required: true
        type: string
      simtest_repo:
        description: 'Owner/Repo for SimTest (ex: AntaresSimulatorTeam/SimTest)'
        required: false
        type: string
        default: 'AntaresSimulatorTeam/SimTest'
    secrets:
      SIMTEST_PAT:
        required: true
      CALLER_GITHUB_TOKEN:
        required: true

permissions:
  contents: read
  id-token: none

jobs:
  wait-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify SIMTEST PAT and access
        env:
          SIMTEST_PAT: ${{ secrets.SIMTEST_PAT }}
          SIMTEST_REPO: ${{ inputs.simtest_repo }}
        run: |
          set -euo pipefail
          echo "Vérification du token et de l'accès au dépôt: $SIMTEST_REPO"

          # Vérifier le propriétaire du token et les scopes via /user (headers contiennent X-OAuth-Scopes)
          echo "Checking token owner and scopes..."
          curl -s -D /tmp/token_headers -o /tmp/token_body -H "Authorization: token $SIMTEST_PAT" https://api.github.com/user || true
          echo "Token owner response (body head):"
          head -c 400 /tmp/token_body || true
          echo
          echo "Token scopes (X-OAuth-Scopes):"
          grep -i '^x-oauth-scopes:' /tmp/token_headers || true
          echo

          # Vérifier l'accès au dépôt cible (utile pour diagnostiquer 403)
          echo "Checking repository access..."
          HTTP_REPO=$(curl -s -o /tmp/repo_body -w "%{http_code}" -H "Authorization: token $SIMTEST_PAT" "https://api.github.com/repos/${SIMTEST_REPO}") || true
          echo "Repo HTTP code: $HTTP_REPO"
          echo "Repo response (first 800 chars):"
          head -c 800 /tmp/repo_body || true
          if [ "$HTTP_REPO" != "200" ]; then
            echo "Impossible d'accéder au dépôt avec ce token (code $HTTP_REPO). Vérifiez le scope du PAT, l'accès du compte au dépôt ou l'autorisation SSO."
            exit 2
          else
            echo "Accès au dépôt OK."
          fi

      - name: Wait for release assets
        env:
          GITHUB_TOKEN: ${{ secrets.CALLER_GITHUB_TOKEN }}
          TAG: ${{ inputs.tag_name }}
          OWNER_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG="${TAG}"
          OWNER_REPO="${OWNER_REPO}"
          echo "Waiting for assets on release ${OWNER_REPO} tag ${TAG}..."

          MAX_WAIT=900        # secondes totales max (ajuster si besoin)
          INTERVAL=10         # intervalle initial en secondes
          ELAPSED=0

          # attendre que la release existe et ait des assets
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            echo "Checking release (elapsed ${ELAPSED}s)..."

            # obtenir la release par tag
            REL_RESP=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/${OWNER_REPO}/releases/tags/${TAG}") || true
            REL_ID=$(echo "$REL_RESP" | jq -r '.id // empty')

            if [ -z "$REL_ID" ]; then
              echo "Release not found yet."
            else
              ASSETS_COUNT=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/${OWNER_REPO}/releases/${REL_ID}/assets" | jq 'length')
              echo "Assets count: ${ASSETS_COUNT:-0}"
              if [ "${ASSETS_COUNT:-0}" -gt 0 ]; then
                echo "Assets ready (count=${ASSETS_COUNT}). Continuing to dispatch."
                break
              fi
            fi

            echo "No assets yet. Sleeping ${INTERVAL}s..."
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
            INTERVAL=$((INTERVAL * 2))
            if [ $INTERVAL -gt 60 ]; then INTERVAL=60; fi
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "Timeout waiting for release assets after ${MAX_WAIT}s."
            exit 2
          fi

      - name: Dispatch to SimTest
        env:
          SIMTEST_PAT: ${{ secrets.SIMTEST_PAT }}
          SIMTEST_REPO: ${{ inputs.simtest_repo }}
          TAG: ${{ inputs.tag_name }}
          RELEASE_URL: ${{ inputs.release_url }}
        run: |
          set -euo pipefail

          CLIENT_PAYLOAD=$(jq -n --arg tag "$TAG" --arg release_url "$RELEASE_URL" '{ tag_name:$tag, release_url:$release_url }')

          ATTEMPT=0
          MAX=3
          while [ $ATTEMPT -lt $MAX ]; do
            ATTEMPT=$((ATTEMPT+1))
            echo "Dispatch attempt $ATTEMPT to $SIMTEST_REPO"

            DISPATCH_JSON=$(jq -n --arg etype "antares-rc-published" --argjson payload "$CLIENT_PAYLOAD" '{event_type: $etype, client_payload: $payload}')

            HTTP=$(curl -s -o /tmp/dispatch_resp -w "%{http_code}" -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: token $SIMTEST_PAT" \
              "https://api.github.com/repos/${SIMTEST_REPO}/dispatches" \
              -d "$DISPATCH_JSON" ) || true

            cat /tmp/dispatch_resp || true
            if [ "$HTTP" = "204" ] || [ "$HTTP" = "200" ]; then
              echo "Dispatch succeeded"
              exit 0
            else
              echo "Dispatch returned HTTP $HTTP"
              if [ $ATTEMPT -lt $MAX ]; then
                echo "Retrying in 5s..."
                sleep 5
              else
                echo "All attempts failed"
                exit 2
              fi
            fi
          done

