name: Create new release

permissions:
  contents: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Target branch or full commit SHA"
        required: true
      release_tag:
        description: "Release tag"
        required: true
      release_name:
        description: "Release name"
        required: true
      run-tests:
        description: "Run all tests?"
        required: true
        type: boolean
      set_latest:
        description: "Set the release as latest"
        required: true
        type: boolean
jobs:
  release:
    name: Release pushed tag
    runs-on: ubuntu-22.04
    outputs:
      release_url: ${{ steps.create_release.outputs.release_url }}
      tag: ${{ steps.create_release.outputs.tag }}
    steps:
    - name: Create release
      id: create_release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ github.event.inputs.release_tag }}
        title: ${{ github.event.inputs.release_name }}
        tests: ${{ github.event.inputs.run-tests }}
        target_branch: ${{ github.event.inputs.target_branch }}
        latest: ${{ github.event.inputs.set_latest }}
      run: |
        gh release create "$tag" \
            --repo="$GITHUB_REPOSITORY" \
            --title="$title" \
            --notes="Run tests: $tests"\
            --target="$target_branch" \
            --latest=$latest
        # Get release URL from gh CLI
        REL=$(gh release view "$tag" --repo="$GITHUB_REPOSITORY" --json url --jq '.url') || true
        echo "release_url=${REL}" >> $GITHUB_OUTPUT
        echo "tag=${tag}" >> $GITHUB_OUTPUT

  ubuntu:
    name: Release - Ubuntu
    needs: release
    uses: ./.github/workflows/ubuntu.yml
    with:
      run-tests: ${{ inputs.run-tests }}
      target_branch: ${{ inputs.target_branch }}

  windows:
    name: Release - Windows
    needs: release
    uses: ./.github/workflows/windows-vcpkg.yml
    with:
      run-tests: ${{ inputs.run-tests }}
      target_branch: ${{ inputs.target_branch }}

  centos7:
    name: Release - centos7
    needs: release
    uses: ./.github/workflows/centos7.yml
    with:
      run-tests: ${{ inputs.run-tests }}
      target_branch: ${{ inputs.target_branch }}

  oracle8:
    name: Release - oracle8
    needs: release
    uses: ./.github/workflows/oracle8.yml
    with:
      run-tests: ${{ inputs.run-tests }}
      target_branch: ${{ inputs.target_branch }}

  user_guide:
    name: User Guide
    needs: release
    uses: ./.github/workflows/build-userguide.yml
    with:
      run-tests: ${{ inputs.run-tests }}
      target_branch: ${{ inputs.target_branch }}

  notify_simtest:
    name: Notify SimTest
    needs:
      - ubuntu
      - windows
      - centos7
      - oracle8
      - user_guide
    # Appel du workflow réutilisable au niveau du job
    uses: ./.github/workflows/dispatch-simtest.yml
    with:
      tag_name: ${{ needs.release.outputs.tag }}
      release_url: ${{ needs.release.outputs.release_url }}
      simtest_repo: MarechalJason/SimTest
    secrets:
      SIMTEST_PAT: ${{ secrets.SIMTEST_REPO_PAT_JM }}
