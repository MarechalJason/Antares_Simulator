name: Create new release

permissions:
  contents: write
  actions: read
  id-token: write

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Target branch or full commit SHA"
        required: true
      release_tag:
        description: "Release tag"
        required: true
      release_name:
        description: "Release name"
        required: true
      run-tests:
        description: "Run all tests?"
        required: true
        type: boolean
      set_latest:
        description: "Set the release as latest"
        required: true
        type: boolean
      generate_results:
        description: "Generate results?"
        required: true
        type: boolean
        default: false
jobs:
  release:
    name: Release pushed tag
    runs-on: ubuntu-22.04
    outputs:
      release_url: ${{ steps.create_release.outputs.release_url }}
      tag: ${{ steps.create_release.outputs.tag }}
    steps:
    - name: Create release
      id: create_release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ github.event.inputs.release_tag }}
        title: ${{ github.event.inputs.release_name }}
        tests: ${{ github.event.inputs.run-tests }}
        target_branch: ${{ github.event.inputs.target_branch }}
        latest: ${{ github.event.inputs.set_latest }}
      run: |
        gh release create "$tag" \
            --repo="$GITHUB_REPOSITORY" \
            --title="$title" \
            --notes="Run tests: $tests"\
            --target="$target_branch" \
            --latest=$latest
        # Get release URL from gh CLI
        REL=$(gh release view "$tag" --repo="$GITHUB_REPOSITORY" --json url --jq '.url') || true
        echo "release_url=${REL}" >> $GITHUB_OUTPUT
        echo "tag=${tag}" >> $GITHUB_OUTPUT

  ubuntu:
    name: Release - Ubuntu
    needs: release
    uses: ./.github/workflows/ubuntu.yml
    with:
      run-tests: ${{ inputs.run-tests }}
      target_branch: ${{ inputs.target_branch }}

  windows:
    name: Release - Windows
    needs: release
    uses: ./.github/workflows/windows-vcpkg.yml
    with:
      run-tests: ${{ inputs.run-tests }}
      target_branch: ${{ inputs.target_branch }}

  centos7:
    name: Release - centos7
    needs: release
    uses: ./.github/workflows/centos7.yml
    with:
      run-tests: ${{ inputs.run-tests }}
      target_branch: ${{ inputs.target_branch }}

  oracle8:
    name: Release - oracle8
    needs: release
    uses: ./.github/workflows/oracle8.yml
    with:
      run-tests: ${{ inputs.run-tests }}
      target_branch: ${{ inputs.target_branch }}

  user_guide:
    name: User Guide
    needs: release
    uses: ./.github/workflows/build-userguide.yml
    with:
      run-tests: ${{ inputs.run-tests }}
      target_branch: ${{ inputs.target_branch }}

  notify_simtest:
    name: Notify SimTest
    needs:
      - ubuntu
    # Only run this job if the `generate_results` input is true AND all the required build jobs succeeded.
    # If you'd like to generate results even when some builds fail, replace this condition with a less strict one
    # (for example, exclude some jobs) or add a new input like `allow_partial_results` to control that behavior.
    if: ${{ github.event.inputs.generate_results == 'true' && needs.ubuntu.result == 'success' }}
    # Call the reusable workflow hosted in MarechalJason/SimTest
    # ASSUMPTION: we call the `main` ref of that repository. Change the ref if you prefer a tag or SHA.
    uses: MarechalJason/SimTest/.github/workflows/generate-reference.yml@main
    with:
      # Map inputs expected by the external reusable workflow
      release_tag: ${{ github.event.inputs.release_tag }}
      antares_tag: ${{ github.event.inputs.release_tag }}
      antares_tests_tag: ''
      target_branch: ${{ inputs.target_branch }}
    # Note: the external reusable workflow currently does not declare secrets in its 'workflow_call',
    # so we cannot pass SIMTEST_PAT here. If the remote workflow needs a PAT, update its 'on: workflow_call: secrets:'
    # to declare the secret, then re-add mapping here.
    secrets:
      SIMTEST_PAT: ${{ secrets.SIMTEST_REPO_PAT_JM }}

