name: "Download and run test study batches"
description: "Download and run .zip tests from SimTest"
inputs:
  simtest-tag:
    description: 'SimTest tag'
    required: true
  batch-name:
    description: 'Name of the study batch'
    required: true
  os:
    description: 'OS used for github action'
    required: true
  variant:
    description: 'launch specific test'
    required: false
    default: "json"
runs:
  using: "composite"
  steps:
  - id: download-extract
    shell: bash
    run: |
           cd src/tests/resources/batches
           curl -Ls -o batch.zip https://github.com/AntaresSimulatorTeam/SimTest/releases/download/${{ inputs.simtest-tag }}/${{ inputs.batch-name }}-${{ inputs.os }}.zip
           unzip batch.zip
           rm batch.zip
           echo "Top-level content after unzip:"
           ls -la
           echo "First two levels (directories only):"
           find . -maxdepth 2 -type d | sort
           pwd
           ls ./valid-named-mps/reservoir-MaxPumping
           file ./valid-named-mps/reservoir-MaxPumping

  - name: Run tests
    # Disable "fail fast" behavior
    shell: bash {0}
    run: |
           echo "=================="
           echo "= Running Test: ${{ inputs.batch-name }} (${{ inputs.variant }})"
           echo "=================="
           cd _build
           ctest -C Release --output-on-failure -R ${{inputs.variant}}
           echo "RET_CODE=$?" >> $GITHUB_ENV

  - name: Clean batches
    shell: bash
    run: |
           rm -rf src/tests/resources/batches/*
           (exit ${{env.RET_CODE}})
