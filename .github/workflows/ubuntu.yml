name: Ubuntu CI (push and/or release)

on:
  push:
    branches:
    - develop
    - feature/*
    - features/*
    - fix/*
    - issue-*
    - release/*
    - doc/*
    - dependabot/**
    - tests/*
    - copilot/*
  schedule:
  - cron: '21 2 * * *'
  workflow_call:
    inputs:
      run-tests:
        required: true
        type: string
      target_branch:
        required: true
        type: string

env:
  GITHUB_TOKEN: ${{ github.token }}
  IS_RELEASE: ${{ github.event_name == 'workflow_dispatch' }}
  RUN_SIMPLE_TESTS: ${{ github.event_name == 'push' || inputs.run-tests == 'true' }}
  RUN_EXTENDED_TESTS: ${{ github.event_name == 'schedule' || inputs.run-tests == 'true' }}
  REF: ${{ inputs.target_branch =='' && github.ref || inputs.target_branch}}
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  triplet: x64-linux
  PYTHON_VERSION: "3.12"

jobs:

  build:
    name: Build
    env:
      ORTOOLS_DIR: ${{ github.workspace }}/or-tools
      os: ubuntu-22.04
      # Caching strategy of VCPKG dependencies
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg_cache,readwrite"

    runs-on: ubuntu-22.04
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ env.REF }}

    - name: Install VCPKG
      run: git submodule update --init vcpkg && ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

    - name: Restore vcpkg binary dir from cache
      id: cache-vcpkg-binary
      uses: actions/cache/restore@v5
      with:
        path: ${{ github.workspace }}/vcpkg_cache
        key: vcpkg-cache-ubuntu-${{ hashFiles('src/vcpkg.json', '.git/modules/vcpkg/HEAD') }}
        restore-keys: vcpkg-cache-ubuntu-

    - name: Install ccache
      run: sudo apt-get install -y ccache

    - name: Restore ccache cache
      id: cache
      uses: actions/cache/restore@v5
      with:
        path: ${{ github.workspace }}/.ccache_ubuntu
        key: ${{ env.os }}-${{ github.ref_name }}
        restore-keys: |
          ${{ env.os }}-

    - name: Configure ccache
      run: |
        ccache --set-config=cache_dir=${{ github.workspace }}/.ccache_ubuntu
        ccache --set-config=max_size=500M
        ccache --set-config=compression=true
        ccache -p
        ccache -z

    - name: Install libraries
      run: |
        sudo apt-get update
        sudo apt-get install uuid-dev
        sudo apt-get install xsltproc

    - name: Config OR-Tools URL
      run: |
        echo "ORTOOLS_URL=https://github.com/rte-france/or-tools-rte/releases/download/$(cat ortools_tag)/ortools_cxx_ubuntu-22.04_static_sirius.zip" >> $GITHUB_ENV

    - name: Download pre-compiled librairies
      uses: ./.github/workflows/download-extract-precompiled-libraries-tgz
      with:
        os: ${{env.os}}
        ortools-url: ${{env.ORTOOLS_URL}}
        ortools-dir: ${{env.ORTOOLS_DIR}}

    - name: Set up Python
      id: setup-python
      uses: actions/setup-python@v6
      with:
        python-version: ${{env.PYTHON_VERSION}}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip3 install -r src/tests/examples/requirements.txt

    - name: Configure
      run: |
        cmake -B _build -S src \
        -DCMAKE_C_COMPILER_LAUNCHER=ccache \
        -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
        -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake \
        -DVCPKG_TARGET_TRIPLET=x64-linux-release \
        -DCMAKE_BUILD_TYPE=Release \
        -DBUILD_TESTING=ON \
        -DBUILD_TOOLS=ON \
        -DCMAKE_PREFIX_PATH=${{ env.ORTOOLS_DIR }}/install \
        -DPython3_EXECUTABLE="${{ env.Python3_ROOT_DIR }}/bin/python"

    - name: Build
      run: |
        cmake --build _build -j$(nproc)

    - name: Creation of complete .tar.gz archive
      if: ${{ success() }}
      run: |
        cd _build
        cpack -G TGZ -D CPACK_INSTALLED_DIRECTORIES="${{ env.ORTOOLS_DIR }}/install/lib;bin"

    - name: Creation of executables .tar.gz archive
      if: ${{ success() }}
      run: |
        cd _build
        cmake --install . --prefix install
        pushd .
        cd install/bin
        cp ${{ env.ORTOOLS_DIR }}/install/lib/*.so* .
        tar czf ../../antares-solver_ubuntu22.04.tar.gz antares-solver antares-modeler antares-problem-generator libsirius_solver.so *.so*
        popd
        rm -rf install

    - name: Extract solver into _build/solver
      if: ${{ success() }}
      run: |
        mkdir -p _build/solver
        tar xzf _build/antares-solver_ubuntu22.04.tar.gz -C _build/solver || true
        chmod +x _build/solver/antares-solver || true
        chmod +x _build/solver/antares-modeler || true

    - name: Both previous archives upload
      if: ${{ success() }}
      uses: actions/upload-artifact@v7
      with:
        name: ubuntu-targz
        path: _build/*.tar.gz

    - name: Run API tests
      run: |
        cmake --install _build --prefix antares_install
        cd src/api_client_example
         cmake -B _build -S . \
         -DCMAKE_C_COMPILER_LAUNCHER=ccache \
         -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
         -DCMAKE_BUILD_TYPE=Release \
         -DBUILD_TESTING=ON \
         -DCMAKE_TOOLCHAIN_FILE=${{github.workspace}}/vcpkg/scripts/buildsystems/vcpkg.cmake \
         -DVCPKG_TARGET_TRIPLET=x64-linux-release \
         -DCMAKE_PREFIX_PATH="${{github.workspace}}/_build/vcpkg_installed/x64-linux-release;${{github.workspace}}/install;${{ env.ORTOOLS_DIR }}/install;${{github.workspace}}/antares_install"
         cmake --build _build -j$(nproc)
         cd _build
         ctest -C Release --output-on-failure

    - name: Run unit and end-to-end tests
      if: ${{ env.RUN_SIMPLE_TESTS == 'true' && !cancelled() }}
      run: |
        cd _build
        ctest -C Release --output-on-failure -L "unit|end-to-end"

    - name: Merge XML reports into single HTML
      if: ${{ env.RUN_SIMPLE_TESTS == 'true' && !cancelled() }}
      run: |
        cd _build/tests
        ${{github.workspace}}/src/tests/merge_all.sh ${{github.workspace}}/src/tests/format_xml_report.xsl

    - name: Rename report
      if: ${{ env.RUN_SIMPLE_TESTS == 'true' && !cancelled() }}
      run: |
        mkdir testing-report
        mv ${{ github.workspace }}/_build/tests/report.html testing-report/$PAGE
      env:
        PAGE: ${{ github.sha }}.html

    - name: Installer .deb creation
      if: ${{ success() }}
      run: |
        cd _build
        cpack -G DEB -D CPACK_INSTALLED_DIRECTORIES="${{ env.ORTOOLS_DIR }}/install/lib;bin"

    - name: Installer deb upload push
      uses: actions/upload-artifact@v7
      with:
        name: deb
        path: _build/*.deb


    - name: Cache vcpkg binary dir
      if: always()
      id: save-cache-vcpkg-binary
      uses: actions/cache/save@v5
      with:
        path: ${{ github.workspace }}/vcpkg_cache
        key: vcpkg-cache-ubuntu-${{ hashFiles('src/vcpkg.json', '.git/modules/vcpkg/HEAD') }}

    - name: Display ccache statistics
      run: ccache -s

    - name: Delete old cache
      continue-on-error: true
      env:
        GH_TOKEN: ${{ github.token }}
        GH_DEBUG: api gh cache delete
      if: ${{ !cancelled() && steps.cache.outputs.cache-hit }}
      run: gh cache delete --repo ${{ github.repository }} ${{ steps.cache.outputs.cache-primary-key }}

    - name: Save ccache cache
      if: ${{ !cancelled() }}
      uses: actions/cache/save@v5
      with:
        path: ${{ github.workspace }}/.ccache_ubuntu
        key: ${{ steps.cache.outputs.cache-primary-key }}

    - name: Clean object files from build directory
      run: |
        ls _build
        ls _build/solver
        find _build \( -name "*.o" -o -name "*.so" -o -name "*.a" -o -name "*.obj" -o -name "*.lo" -o -name "*.pch" \)
        find _build \( -name "*.o" -o -name "*.so" -o -name "*.a" -o -name "*.obj" -o -name "*.lo" -o -name "*.pch" \) -delete
        find _build -type f -executable -delete
        rm -rf _build/vcpkg_installed
        rm -rf _build/tools

    - name: Upload build directory for test jobs
      uses: actions/upload-artifact@v7
      with:
        name: ubuntu-build-dir
        path: _build

  test-version:
    name: Test (versionTestNR)
    needs: build
    runs-on: ubuntu-22.04
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ env.REF }}

    - name: Download build directory
      uses: actions/download-artifact@v7
      with:
        name: ubuntu-build-dir
        path: _build/

    - name: Download build directory
      uses: actions/download-artifact@v7
      with:
        name: ubuntu-targz
        path: _build/

    - name: Extract solver exe
      run: |
        mkdir -p _build/solver
        mkdir -p _build/api
        tar xzf _build/antares-solver_ubuntu22.04.tar.gz -C _build/solver
        cp _build/solver/antares-problem-generator _build/api/antares-problem-generator
        echo "LD_LIBRARY_PATH=${GITHUB_WORKSPACE}/_build/solver:${LD_LIBRARY_PATH}" >> $GITHUB_ENV

    - name: Extract simtest version
      id: simtest
      run: |
        VERSION=$(python3 -c "import json; print(json.load(open('./simtest.json'))['version'])")
        echo "version=${VERSION}" >> $GITHUB_OUTPUT

    - name: Run simulator tests
      uses: ./.github/actions/run-simulator-tests
      with:
        test-nr-target: versionTestNR
        test-registry-mode: committed
        simtest-version: ${{ steps.simtest.outputs.version }}
        python-version: ${{ env.PYTHON_VERSION }}


  test-latest:
    name: Test (latestTestNR)
    needs: build
    runs-on: ubuntu-22.04
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ env.REF }}

    - name: Download build directory
      uses: actions/download-artifact@v7
      with:
        name: ubuntu-build-dir
        path: _build/

    - name: Download build archives
      uses: actions/download-artifact@v7
      with:
        name: ubuntu-targz
        path: _build/

    - name: Extract solver exe
      run: |
        mkdir -p _build/solver
        mkdir -p _build/api
        tar xzf _build/antares-solver_ubuntu22.04.tar.gz -C _build/solver
        cp _build/solver/antares-problem-generator _build/api/antares-problem-generator
        chmod +x _build/api/antares-problem-generator
        chmod +x _build/solver/antares-solver
        chmod +x _build/solver/antares-modeler
        ls -la _build/api

    - name: Extract simtest version
      id: simtest
      run: |
        VERSION=$(python3 -c "import json; print(json.load(open('./simtest.json'))['version'])")
        echo "version=${VERSION}" >> $GITHUB_OUTPUT

    - name: Run simulator tests
      uses: ./.github/actions/run-simulator-tests
      with:
        test-nr-target: latestTestNR
        test-registry-mode: latest
        simtest-version: ${{ steps.simtest.outputs.version }}
        python-version: ${{ env.PYTHON_VERSION }}

  publish:
    name: Publish
    needs: [build, test-latest, test-version]
    runs-on: ubuntu-22.04
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ env.REF }}

    - name: Download build artifacts
      uses: actions/download-artifact@v7
      with:
        name: ubuntu-targz
        path: _build

    - name: Download deb artifacts
      uses: actions/download-artifact@v7
      with:
        name: deb
        path: _build

    - name: Publish assets
      if: ${{ env.IS_RELEASE == 'true' }}
      env:
        GITHUB_TOKEN: ${{ github.token }}
        tag: ${{ github.event.inputs.release_tag }}
      run: |
        gh release upload "$tag" _build/*.tar.gz _build/*.deb

    - name: Update continuous-delivery release
      if: ${{ github.ref == 'refs/heads/develop' }}
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mv _build/antares-*-Ubuntu-22.04.tar.gz _build/antares-cd-Ubuntu-22.04.tar.gz
        mv _build/antares-*-Ubuntu-22.04.deb _build/antares-cd-Ubuntu-22.04.deb
        gh release upload --clobber continuous-delivery _build/*.tar.gz _build/*.deb
        gh release edit continuous-delivery --title "continuous delivery (generated $(date +'%Y-%m-%d %H:%M'))"
        gh api repos/${{ github.repository }}/git/refs/tags/continuous-delivery -X PATCH -f sha=$(git rev-parse HEAD)


