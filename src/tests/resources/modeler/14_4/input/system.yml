system:
  id: sys_example_14_4
  description: >
    Single component with constant parameters p=10 and c=20.
    The constraint x = sum(t+2 .. t+0, p) + c always has an empty sum (from > to),
    so x must equal c = 20 at every timestep.
    Expected: x = 20 at all timesteps, objective = 100..

  model-libraries: lib_example_14_4

  components:
    - id: c1
      model: lib_example_14_4.inverted_bounds_demo

      parameters:
        - id: p
          time-dependent: false
          scenario-dependent: false
          value: 10
        - id: c
          time-dependent: false
          scenario-dependent: false
          value: 20
