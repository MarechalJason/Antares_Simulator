library:
  id: lib_example_14_5
  description: Fixed sum bounds that require cyclic wrap-around (upper index exceeds window size)

  models:
    - id: fixed_bounds_wrap_demo
      description: >
        Variable bounded below by sum(3 .. 6, p) with 5 timesteps (size=5).
        The upper bound 6 exceeds the last valid index 4, so indices 5 and 6
        wrap cyclically: normalizeTimeIndex(5, 5)=0, normalizeTimeIndex(6, 5)=1.
        Accessed indices: 3, 4, 0, 1 -> p[3]+p[4]+p[0]+p[1] = 4+5+1+2 = 12.
        This result is constant across all timesteps (fixed bounds).
      parameters:
        - id: p
          time-dependent: true
          scenario-dependent: false
      variables:
        - id: x
          lower-bound: 0
          upper-bound: 1000
          variable-type: continuous
          # x[t] >= sum(3..6, p) = p[3]+p[4]+p[0]+p[1] = 4+5+1+2 = 12 for all t
      constraints:
        - id: lower_bound_from_wrapping_sum
          expression: x >= sum(3 .. 6, p)
      objective-contributions:
        - id: objective
          expression: sum(x)
